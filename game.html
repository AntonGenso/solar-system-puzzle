    lvl2:{ru:'Размер',en:'Size',uz:'Hajm'},

    next:{ru:'Дальше',en:'Next',uz:'Keyingi'},

  function t(k){ return (UI[k] && UI[k][LANG]) || (UI[k] && UI[k].en) || ''; }
  function nameOf(k){ return NAMES[LANG][k] || NAMES.en[k]; }
  function factOf(k){ return FACTS[LANG][k] || FACTS.en[k]; }

  const SUN = {x:360, y:540, box:150};
  const RING0 = 96, RGAP = 31;
  function ringR(k){ return RING0 + k*RGAP; }
  const PLACE_ANGLE = [-90,-20,40,100,150,200,250,310].map(d=>d*Math.PI/180);
  function ringPos(k){ return { x: SUN.x + ringR(k)*Math.cos(PLACE_ANGLE[k]), y: SUN.y + ringR(k)*Math.sin(PLACE_ANGLE[k]) }; }
  const BOX = {mercury:64,venus:76,earth:80,mars:70,jupiter:100,saturn:108,uranus:84,neptune:80};

  // L2 size ladder (smallest top -> largest bottom)
  function l2size(k){ return 50 + k*8; } // diameter 50..106
  const L2SLOTS=[]; (function(){ let y=176; for(let k=0;k<8;k++){ const r=l2size(k)/2; if(k>0) y += l2size(k-1)/2 + r + 26; L2SLOTS.push({x:DW/2,y:y,r:r}); } })();

  const DOCK_Y = 1186;
  function dockSlot(i){ return { x: 56 + i*(608/7), y: DOCK_Y }; }

  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  let scale=1, offX=0, offY=0, DPR=1;
  function resize(){
    DPR = Math.min(window.devicePixelRatio||1, 2);
    const w = window.innerWidth, h = window.innerHeight;
    scale = Math.min(w/DW, h/DH); offX=(w-DW*scale)/2; offY=(h-DH*scale)/2;
    cv.width=Math.floor(w*DPR); cv.height=Math.floor(h*DPR); cv.style.width=w+'px'; cv.style.height=h+'px';
  }
  window.addEventListener('resize', resize);
  function toDesign(cx,cy){ return {x:(cx-offX)/scale, y:(cy-offY)/scale}; }

  const images={}; for(const k in SPRITES){ const im=new Image(); im.src=SPRITES[k]; images[k]=im; }
  function drawSprite(key,cx,cy,w){ const im=images[key]; if(!im||!im.complete||!im.naturalWidth) return;
    const ar=im.naturalHeight/im.naturalWidth, h=w*ar; ctx.drawImage(im,Math.round(cx-w/2),Math.round(cy-h/2),Math.round(w),Math.round(h)); }

  const stars=[]; for(let i=0;i<110;i++) stars.push({x:Math.random()*DW,y:Math.random()*DH,s:Math.random()<0.6?2:(Math.random()<0.9?3:4),tw:Math.random()*6.28,sp:0.6+Math.random()*2,cross:Math.random()<0.08});

  let state='loading', level=1, score=50, lockedScore=0;

  let asteroids=[];
  let factText='', factTimer=0, pulseT=-1, pulseTimer=0, shake=0;
  let introT=0, introPhase='tour', nameIdx=-1, sentScore=false;

  function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;const tmp=a[i];a[i]=a[j];a[j]=tmp;} return a; }

  function setupLevel(lv, withIntro){
    level=lv; score=50; carried=null; dragging=false; sentScore=false; factTimer=0; pulseT=-1; shake=0;
    curOrder = lv===1?ORDER_DIST:ORDER_SIZE;
    const dslots = shuffle(curOrder.map((_,i)=>i));
    curOrder.forEach((key,k)=>{
      const ds=dockSlot(dslots[k]); let gx,gy,box;
      if(lv===1){ const rp=ringPos(k); gx=rp.x; gy=rp.y; box=BOX[key]; }
      else { const sp=L2SLOTS[k]; gx=sp.x; gy=sp.y; box=l2size(k); }
      planets[key]={key,tIndex:k,box,dockX:ds.x,dockY:ds.y,gx,gy,
        x:withIntro?gx:ds.x, y:withIntro?gy:ds.y, state:withIntro?'intro':'dock', tw:null};
    });
    asteroids=[{x:160,y:760,vx:52,vy:34,r:34,cool:0}];
    if(lv===2) asteroids.push({x:560,y:520,vx:-46,vy:42,r:30,cool:0});

    else { rocket={x:SUN.x,y:1000,tx:SUN.x,ty:1000}; state='play'; }
  }
  function newGame(){ lockedScore=0; setupLevel(1,true); }

  function skipRect(){ return {x:DW-208,y:24,w:184,h:60}; }
  function pauseRect(){ return {x:DW-92,y:24,w:64,h:64}; }
  function langRect(){ return {x:24,y:88,w:96,h:56}; }
  function bigRect(){ return {x:DW/2-170,y:700,w:340,h:82}; } // next (level clear)
  function winRetryRect(){ return {x:DW/2-170,y:678,w:340,h:78}; }
  function winMenuRect(){ return {x:DW/2-170,y:772,w:340,h:78}; }
  function closeRect(){ return {x:DW/2+184,y:418,w:52,h:52}; }
  function retryRect(){ return {x:DW/2-170,y:548,w:340,h:82}; }
  function menuRect(){ return {x:DW/2-170,y:648,w:340,h:82}; }
  function inRect(p,r){ return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
  function cycleLang(){ const seq=['ru','en','uz']; LANG=seq[(seq.indexOf(LANG)+1)%seq.length]; }

  function pointerDown(p){
    if(state==='intro'){ if(inRect(p,langRect())){cycleLang();return;} if(inRect(p,skipRect())) skipIntro(); return; }
    if(state==='levelclear'){ if(inRect(p,bigRect())) setupLevel(2,false); return; }
    if(state==='win'){ if(inRect(p,winRetryRect())) newGame(); else if(inRect(p,winMenuRect())) location.href='index.html'+(location.search||''); return; }
    if(state==='pause'){
      if(inRect(p,closeRect())) state='play';
      else if(inRect(p,retryRect())) setupLevel(level,false);
      else if(inRect(p,menuRect())) location.href='index.html'+(location.search||'');
      return;
    }
    if(state!=='play') return;
    if(inRect(p,langRect())){ cycleLang(); return; }
    if(inRect(p,pauseRect())){ state='pause'; return; }
    if(!carried){ let best=null,bd=1e9;
      curOrder.forEach(key=>{ const pl=planets[key]; if(pl.state!=='dock')return; const d=Math.hypot(p.x-pl.x,p.y-pl.y); if(d<pl.box*0.6 && d<bd){bd=d;best=pl;} });
      if(best){ carried=best; best.state='carried'; } }
    dragging=true; rocket.tx=p.x; rocket.ty=p.y;
  }
  function pointerMove(p){ if(dragging){ rocket.tx=p.x; rocket.ty=p.y; } }
  function pointerUp(){ dragging=false; if(carried) attemptDrop(); }

  function attemptDrop(){
    const pl=carried; carried=null;
    if(level===1){
      const dist=Math.hypot(rocket.x-SUN.x,rocket.y-SUN.y);
      if(rocket.y>1090 || dist>ringR(7)+70){ returnToDock(pl); return; }
      let k=0,bd=1e9; for(let i=0;i<8;i++){ const d=Math.abs(dist-ringR(i)); if(d<bd){bd=d;k=i;} }
      if(bd>70){ returnToDock(pl); return; }
      if(k===pl.tIndex) placeTarget(pl); else wrongDrop(pl);
    } else {
      let k=0,bd=1e9; for(let i=0;i<8;i++){ const s=L2SLOTS[i]; const d=Math.hypot(rocket.x-s.x,rocket.y-s.y); if(d<bd){bd=d;k=i;} }
      if(bd>L2SLOTS[k].r+52){ returnToDock(pl); return; }
      if(k===pl.tIndex) placeTarget(pl); else wrongDrop(pl);
    }
  }
  function returnToDock(pl){ pl.state='dock'; pl.x=pl.dockX; pl.y=pl.dockY; }
  function wrongDrop(pl){ score=Math.max(0,score-5); pulseT=pl.tIndex; pulseTimer=1.4; shake=10; returnToDock(pl); }
  function placeTarget(pl){ pl.state='placed'; pl.x=pl.gx; pl.y=pl.gy;
    factText=nameOf(pl.key)+' — '+factOf(pl.key); factTimer=2.8;
    if(curOrder.every(k=>planets[k].state==='placed')) levelComplete(); }
  function sendScore(s){ try{ window.parent.postMessage({type:'SUBMIT_SCORE',score:s},'*'); }catch(e){} }
  function levelComplete(){
    if(sentScore) return; sentScore=true;
    if(level===1){ lockedScore=score; sendScore(lockedScore); state='levelclear'; }
    else { sendScore(lockedScore+score); state='win'; }
  }
  function skipIntro(){ curOrder.forEach(key=>{ const pl=planets[key]; pl.state='dock'; pl.x=pl.dockX; pl.y=pl.dockY; pl.tw=null; }); rocket={x:SUN.x,y:1000,tx:SUN.x,ty:1000}; state='play'; }

  cv.addEventListener('pointerdown', e=>{ e.preventDefault(); try{cv.setPointerCapture(e.pointerId);}catch(_){} pointerDown(toDesign(e.clientX,e.clientY)); });
  cv.addEventListener('pointermove', e=>pointerMove(toDesign(e.clientX,e.clientY)));
  cv.addEventListener('pointerup', ()=>pointerUp());
  cv.addEventListener('pointercancel', ()=>pointerUp());

  let last=performance.now();
  function update(now){
    const dt=Math.min(0.05,(now-last)/1000); last=now;
    if(state==='pause'){ render(); requestAnimationFrame(update); return; }
    for(const s of stars) s.tw+=s.sp*dt;
    if(state==='intro'){
      if(introPhase==='tour'){
        introT+=dt; const idx=Math.floor(introT/0.72);
        if(idx<8){ nameIdx=idx; const pl=planets[curOrder[idx]]; rocket.tx=pl.gx; rocket.ty=pl.gy; }
        else { introPhase='scatter'; curOrder.forEach(key=>{ const pl=planets[key]; pl.tw={fx:pl.x,fy:pl.y,tx:pl.dockX,ty:pl.dockY,p:0}; }); }
      } else {
        let done=true;
        curOrder.forEach(key=>{ const pl=planets[key]; if(pl.tw){ pl.tw.p=Math.min(1,pl.tw.p+dt/0.9);
          const e=1-Math.pow(1-pl.tw.p,3); pl.x=pl.tw.fx+(pl.tw.tx-pl.tw.fx)*e; pl.y=pl.tw.fy+(pl.tw.ty-pl.tw.fy)*e;
          if(pl.tw.p<1) done=false; else { pl.state='dock'; pl.tw=null; } } });
        rocket.tx=SUN.x; rocket.ty=1000; if(done) state='play';
      }
    }
    rocket.x+=(rocket.tx-rocket.x)*Math.min(1,dt*12); rocket.y+=(rocket.ty-rocket.y)*Math.min(1,dt*12);
    if(state==='play'){
      for(const a of asteroids){ a.x+=a.vx*dt; a.y+=a.vy*dt; a.cool=Math.max(0,a.cool-dt);
        if(a.x<60||a.x>DW-60) a.vx*=-1; if(a.y<150||a.y>1050) a.vy*=-1;
        if(carried && a.cool<=0 && Math.hypot(rocket.x-a.x,rocket.y-a.y)<a.r+26){
          score=Math.max(0,score-3); shake=10; a.cool=1.1; const pl=carried; carried=null; returnToDock(pl); } }
    }
    if(factTimer>0) factTimer-=dt;
    if(pulseTimer>0) pulseTimer-=dt; else pulseT=-1;
    if(shake>0) shake=Math.max(0,shake-dt*30);
    render(); requestAnimationFrame(update);
  }

  function render(){
    ctx.setTransform(1,0,0,1,0,0); ctx.imageSmoothingEnabled=false;
    ctx.fillStyle='#06101e'; ctx.fillRect(0,0,cv.width,cv.height);
    const sx=shake>0?(Math.random()-0.5)*shake:0, sy=shake>0?(Math.random()-0.5)*shake:0;
    ctx.setTransform(DPR*scale,0,0,DPR*scale, DPR*(offX+sx), DPR*(offY+sy)); ctx.imageSmoothingEnabled=false;
    ctx.fillStyle='#0A1424'; ctx.fillRect(0,0,DW,DH);
    for(const s of stars){ const al=0.25+0.5*Math.abs(Math.sin(s.tw));
      if(s.cross){ ctx.fillStyle='rgba(250,205,96,'+(al*0.85)+')'; ctx.fillRect(s.x-2,s.y,5,1); ctx.fillRect(s.x,s.y-2,1,5);} 
      else { ctx.fillStyle='rgba(200,220,255,'+al+')'; ctx.fillRect(s.x,s.y,s.s,s.s);} }

    if(level===1) drawRings(); else drawSlots();
    if(level===1) drawSprite('sun', SUN.x, SUN.y, SUN.box);

    curOrder.forEach(key=>{ const pl=planets[key]; if(pl.state==='placed'||pl.state==='intro') drawSprite(key,pl.x,pl.y,pl.box); });
    curOrder.forEach(key=>{ const pl=planets[key]; if(pl.state==='dock') drawSprite(key,pl.x,pl.y,pl.box); });
    if(state==='play'||state==='win'||state==='pause'||state==='levelclear') for(const a of asteroids) drawSprite('asteroid', a.x, a.y, 60);

    drawSprite('rocket', rocket.x, rocket.y, 48);
    if(carried){ drawSprite(carried.key, rocket.x, rocket.y-48, carried.box*0.85);
      label(nameOf(carried.key), rocket.x, rocket.y-48-carried.box*0.5-16, '#F7ECCB', 26); }
    if(state==='intro' && introPhase==='tour' && nameIdx>=0){ const pl=planets[curOrder[nameIdx]]; label(nameOf(pl.key), pl.x, pl.y-pl.box*0.5-18, '#F7ECCB', 30); }
    if(factTimer>0) panelText(factText, DW/2, 156, Math.min(1,factTimer*2));

    label(t('score')+': '+score, 40, 60, '#F7ECCB', 30, 'left');
    label(t(level===1?'lvl1':'lvl2')+' '+level+'/2', DW/2, 56, '#AFC0D6', 24, 'center');
    if(state==='intro') button(skipRect(), t('skip'), 22);
    if(state==='play') pauseButton(pauseRect());
    if(state==='intro'||state==='play') langButton(langRect());
    if(state==='play') label(t(level===1?'goal1':'goal2'), DW/2, 1098, '#AFC0D6', 22, 'center');
    if(state==='pause') pauseOverlay();
    if(state==='levelclear') clearOverlay();
    if(state==='win') winOverlay();
  }

  function drawRings(){
    let hoverRing=-1;
    if(carried){ const rd=Math.hypot(rocket.x-SUN.x,rocket.y-SUN.y); let bd=1e9; for(let i=0;i<8;i++){ const d=Math.abs(rd-ringR(i)); if(d<bd){bd=d;hoverRing=i;} } if(bd>26) hoverRing=-1; }
    for(let i=0;i<8;i++){ const r=ringR(i); ctx.save(); ctx.setLineDash([5,9]);
      let col='rgba(226,206,150,0.20)', lw=1.5, hot=false;
      if(i===pulseT){ const k=Math.abs(Math.sin(pulseTimer*6)); col='rgba(120,230,170,'+(0.45+0.5*k)+')'; lw=3; ctx.setLineDash([]); hot=true; }
      else if(i===hoverRing){ col='rgba(255,255,255,0.5)'; lw=2.5; hot=true; }
      ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.beginPath(); ctx.arc(SUN.x,SUN.y,r,0,Math.PI*2); ctx.stroke(); ctx.restore();
      if(hot){ let nx,ny; if(i===hoverRing && carried){ const rd=Math.hypot(rocket.x-SUN.x,rocket.y-SUN.y)||1; nx=SUN.x-(rocket.x-SUN.x)/rd*r; ny=SUN.y-(rocket.y-SUN.y)/rd*r; } else { nx=SUN.x; ny=SUN.y-r; } ringNumber(i+1,nx,ny); } }
  }
  function drawSlots(){
    let hoverT=-1;
    if(carried){ let bd=1e9; for(let i=0;i<8;i++){ const s=L2SLOTS[i]; const d=Math.hypot(rocket.x-s.x,rocket.y-s.y); if(d<bd){bd=d;hoverT=i;} } if(bd>L2SLOTS[hoverT].r+52) hoverT=-1; }
    for(let i=0;i<8;i++){ const s=L2SLOTS[i]; ctx.save(); ctx.setLineDash([5,9]);
      let col='rgba(246,228,180,0.85)', lw=2;
      if(i===pulseT){ const k=Math.abs(Math.sin(pulseTimer*6)); col='rgba(120,230,170,'+(0.6+0.4*k)+')'; lw=3; ctx.setLineDash([]); }
      else if(i===hoverT){ col='rgba(255,255,255,0.95)'; lw=2.5; }
      ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.stroke(); ctx.restore();
      // number 1..8, same color as the circle, to the left of the slot
      label(''+(i+1), s.x - s.r - 30, s.y + 8, col, 26, 'center'); }
  }

  function allDock(){ return curOrder.every(k=>planets[k].state==='dock') && !carried; }
  function setFont(px){ ctx.font=px+"px 'Pixelify Sans','Press Start 2P',monospace"; }
  function label(text,x,y,color,px,align){ setFont(px); ctx.textAlign=align||'center'; ctx.textBaseline='alphabetic';
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText(text,x+1,y+2); ctx.fillStyle=color; ctx.fillText(text,x,y); }
  function panelText(text,x,yTop,alpha){ const px=22, lh=px+8, maxW=DW-110; setFont(px); ctx.textAlign='center';
    const words=text.split(' '); const lines=[]; let cur='';
    for(const w of words){ const test=cur?cur+' '+w:w; if(ctx.measureText(test).width>maxW && cur){ lines.push(cur); cur=w; } else cur=test; } if(cur) lines.push(cur);
    let mw=0; for(const l of lines){ const lw2=ctx.measureText(l).width; if(lw2>mw) mw=lw2; }
    const h=lines.length*lh+22, w=Math.min(DW-50, mw+44); ctx.globalAlpha=alpha;
    ctx.fillStyle='rgba(7,13,26,0.9)'; roundRect(x-w/2,yTop,w,h,14); ctx.fill(); ctx.textBaseline='alphabetic';
    lines.forEach((l,i)=>{ ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillText(l,x+1,yTop+24+i*lh+1); ctx.fillStyle='#F7ECCB'; ctx.fillText(l,x,yTop+24+i*lh); }); ctx.globalAlpha=1; }
  function ringNumber(n,nx,ny){ ctx.fillStyle='rgba(7,13,26,0.88)'; ctx.beginPath(); ctx.arc(nx,ny,17,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(nx,ny,17,0,Math.PI*2); ctx.stroke(); label(''+n,nx,ny+8,'#F7ECCB',22,'center'); }
  function button(r,text,px){ const g=ctx.createLinearGradient(0,r.y,0,r.y+r.h); g.addColorStop(0,'#FBC04A'); g.addColorStop(1,'#F47A2E');
    ctx.fillStyle=g; roundRect(r.x,r.y,r.w,r.h,r.h/2); ctx.fill(); setFont(px); ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillStyle='#3A1B05'; ctx.fillText(text,r.x+r.w/2,r.y+r.h/2+px*0.36); }
  function pauseButton(r){ ctx.fillStyle='rgba(7,13,26,0.55)'; roundRect(r.x,r.y,r.w,r.h,12); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.5; roundRect(r.x,r.y,r.w,r.h,12); ctx.stroke();
    ctx.fillStyle='#F7ECCB'; const bx=r.x+r.w/2, by=r.y+r.h/2; ctx.fillRect(bx-13,by-15,8,30); ctx.fillRect(bx+5,by-15,8,30); }
  function langButton(r){ ctx.fillStyle='rgba(7,13,26,0.55)'; roundRect(r.x,r.y,r.w,r.h,12); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1.5; roundRect(r.x,r.y,r.w,r.h,12); ctx.stroke();
    label(LANG.toUpperCase(), r.x+r.w/2, r.y+r.h/2+9, '#F7ECCB', 24, 'center'); }
  function pauseOverlay(){ ctx.fillStyle='rgba(6,12,24,0.82)'; ctx.fillRect(0,0,DW,DH);
    const px=110,py=380,pw=500,ph=400; ctx.fillStyle='rgba(13,22,40,0.96)'; roundRect(px,py,pw,ph,22); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=2; roundRect(px,py,pw,ph,22); ctx.stroke();
    label(t('pause'), DW/2, py+78, '#F7ECCB', 40, 'center');
    const c=closeRect(); ctx.strokeStyle='#F7ECCB'; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(c.x+14,c.y+14); ctx.lineTo(c.x+c.w-14,c.y+c.h-14); ctx.moveTo(c.x+c.w-14,c.y+14); ctx.lineTo(c.x+14,c.y+c.h-14); ctx.stroke(); ctx.lineCap='butt';
    button(retryRect(), t('retry'), 28);
    const m=menuRect(); ctx.fillStyle='rgba(255,255,255,0.10)'; roundRect(m.x,m.y,m.w,m.h,m.h/2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2; roundRect(m.x,m.y,m.w,m.h,m.h/2); ctx.stroke();
    label(t('menu'), m.x+m.w/2, m.y+m.h/2+10, '#F7ECCB', 28, 'center'); }
  function clearOverlay(){ ctx.fillStyle='rgba(6,12,24,0.80)'; ctx.fillRect(0,0,DW,DH);
    if(NICK) label(t('pilot')+': '+NICK, DW/2, 500, '#AFC0D6', 22, 'center');
    label(t('done'), DW/2, 560, '#F7ECCB', 48, 'center');
    label(t('score')+': '+score+' / 50', DW/2, 628, '#FBC04A', 28, 'center');
    button(bigRect(), t('next'), 28); }
  function winOverlay(){ ctx.fillStyle='rgba(6,12,24,0.80)'; ctx.fillRect(0,0,DW,DH);
    if(NICK) label(t('pilot')+': '+NICK, DW/2, 498, '#AFC0D6', 22, 'center');
    label(t('win'), DW/2, 560, '#F7ECCB', 56, 'center');
    label(t('score')+': '+(lockedScore+score)+' / 100', DW/2, 628, '#FBC04A', 30, 'center');
    button(winRetryRect(), t('retry'), 28);
    const m=winMenuRect(); ctx.fillStyle='rgba(255,255,255,0.10)'; roundRect(m.x,m.y,m.w,m.h,m.h/2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=2; roundRect(m.x,m.y,m.w,m.h,m.h/2); ctx.stroke();
    label(t('menu'), m.x+m.w/2, m.y+m.h/2+10, '#F7ECCB', 28, 'center'); }
  function roundRect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  let booted=false;
  function boot(){ if(booted)return; booted=true; resize(); newGame(); requestAnimationFrame(update); }
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(boot); }
  setTimeout(boot, 800);
})();

</script>
</body>
</html>
